# Development nginx config — API proxy only (no SSL, no frontend)

events {
    worker_connections 256;
}

http {
    upstream api {
        server api:8000;
    }

    server {
        listen 80;

        client_max_body_size 2G;

        location /api/ {
            proxy_pass         http://api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /health {
            proxy_pass http://api;
        }
    }
}
